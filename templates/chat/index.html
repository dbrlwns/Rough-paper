<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅방 목록</title>
</head>
<body>
    <h1>채팅방 목록</h1>

    {% if rooms %}
        <ul>
            {% for room in rooms %}
                <li>
                    <a href="{% url 'chat_room' room.slug %}">{{ room.name }}</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>개설된 채팅방이 없습니다.</p>
    {% endif %}
</body>
</html>
